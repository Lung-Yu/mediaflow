<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mediaflow</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js" defer></script>
</head>
<body>
  <div class="layout">

    <header>
      <div class="wordmark">media<span>flow</span></div>
      <div class="header-meta">
        <nav class="header-nav">
          <a href="/" class="active">dashboard</a>
          <a href="/srts">transcripts</a>
          <a href="/upload">upload</a>
        </nav>
        <span><span class="live-dot"></span>live</span>
        <span id="live-clock">—</span>
      </div>
    </header>

    {# Stats panel — loaded once on page open #}
    <div id="stats-region"
         hx-get="/partial/stats"
         hx-trigger="load"
         hx-swap="innerHTML">
    </div>

    {# Job list — HTMX loads on page open and refreshes every 30 s #}
    <div id="job-list"
         hx-get="/partial/jobs"
         hx-trigger="load, every 30s"
         hx-swap="innerHTML">
      Loading…
    </div>

    {# Upload queue panel — polled every 10 s #}
    <div id="queue-region"
         hx-get="/partial/queue"
         hx-trigger="every 10s"
         hx-swap="innerHTML">
    </div>

    <footer>
      <span>mediaflow pipeline monitor</span>
      <span>auto-refresh every 30 s</span>
    </footer>

  </div>

  <script>
    function tick() {
      const now = new Date();
      const pad = n => String(n).padStart(2,'0');
      document.getElementById('live-clock').textContent =
        `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} `
        + `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }
    tick();
    setInterval(tick, 1000);

  </script>
</body>
</html>
