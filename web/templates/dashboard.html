<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mediaflow</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js" defer></script>
</head>
<body>
  <div class="layout">

    <header>
      <div class="wordmark">media<span>flow</span></div>
      <div class="header-meta">
        <nav class="header-nav">
          <a href="/" class="active">dashboard</a>
          <a href="/srts">transcripts</a>
          <a href="/upload">upload</a>
        </nav>
        <span><span class="live-dot"></span>live</span>
        <span id="live-clock">—</span>
      </div>
    </header>

    {# Polled region — HTMX refreshes every 5 s #}
    <div id="status-region"
         hx-get="/partial/status"
         hx-trigger="every 5s"
         hx-swap="innerHTML">
      {% include "partials/status.html" %}
    </div>

    {# Upload queue panel — polled every 10 s #}
    <div id="queue-region"
         hx-get="/partial/queue"
         hx-trigger="every 10s"
         hx-swap="innerHTML">
    </div>

    <footer>
      <span>mediaflow pipeline monitor</span>
      <span>auto-refresh every 5 s</span>
    </footer>

  </div>

  <script>
    function tick() {
      const now = new Date();
      const pad = n => String(n).padStart(2,'0');
      document.getElementById('live-clock').textContent =
        `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} `
        + `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }
    tick();
    setInterval(tick, 1000);

    // Preserve expanded accordion state across status-region polls
    (function() {
      let saved = {};
      document.body.addEventListener('htmx:beforeSwap', function(e) {
        if (e.detail.target && e.detail.target.id === 'status-region') {
          saved = {};
          document.querySelectorAll('details.task-accordion[open]').forEach(function(d) {
            const key = d.getAttribute('hx-get');
            const body = d.querySelector('.accordion-body');
            if (key && body && !body.querySelector('.accordion-loading')) {
              saved[key] = body.innerHTML;
            }
          });
        }
      });
      document.body.addEventListener('htmx:afterSwap', function(e) {
        if (e.detail.target && e.detail.target.id === 'status-region') {
          Object.keys(saved).forEach(function(key) {
            const d = document.querySelector('details.task-accordion[hx-get="' + key + '"]');
            if (d) {
              d.open = true;
              const body = d.querySelector('.accordion-body');
              if (body) body.innerHTML = saved[key];
            }
          });
        }
      });
    })();
  </script>
</body>
</html>
