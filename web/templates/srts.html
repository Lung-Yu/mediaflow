<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mediaflow — transcripts</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="layout">
    <header>
      <div class="wordmark">media<span>flow</span></div>
      <nav class="header-nav">
        <a href="/">dashboard</a>
        <a href="/srts" class="active">transcripts</a>
      </nav>
    </header>

    <div class="section">
      <div class="section-header">
        <span class="section-title">Transcripts</span>
        <span class="section-count processing-count">{{ files|length }}</span>
      </div>

      <div class="task-list">
        {% for f in files %}
        <a class="task-row srt-row" href="/srts/{{ f.stem }}">
          <span class="dot dot-completed"></span>
          <span class="task-stem">{{ f.stem }}</span>
          <span class="task-time">{{ f.size_kb }} KB</span>
        </a>
        {% else %}
        <div class="empty">No transcripts found in workspace/3_output/</div>
        {% endfor %}
      </div>
    </div>

    <footer>
      <span>mediaflow pipeline monitor</span>
      <span>{{ files|length }} transcript{{ 's' if files|length != 1 }}</span>
    </footer>
  </div>
</body>
</html>
