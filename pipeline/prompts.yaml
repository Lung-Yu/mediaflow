# Prompt templates for all Ollama calls.
#
# Edit here, then re-run to evaluate:
#   python -m pipeline.rerun --stem <stem> --from-stage summary
#
# Git history tracks every prompt iteration — use `git diff prompts.yaml`
# to correlate prompt changes with output quality.

summarize:
  course:
    overview: |
      以下是一堂課的逐字稿。請用3到5句話摘要本課教學內容：
      講解了哪些概念或技能、有哪些練習或範例、學習者應記住的重點。
      使用繁體中文，直接輸出摘要：

    moments: |
      以下是一段課程字幕片段（格式：[HH:MM:SS] 內容）。
      請找出最多2個教學關鍵時刻（重要概念講解、練習開始、核心結論），
      每個輸出一行，格式：[HH:MM:SS] 描述（繁體中文）
      只輸出符合格式的行，不要其他說明：

    topics: |
      以下是一堂課的逐字稿摘錄。請列出2到6個教學主題或單元，
      每個主題用4到10個繁體中文字概括，每行只寫一個主題名稱，不要編號：

  meeting:
    overview: |
      以下是一場會議的逐字稿。請用3到5句話摘要：
      會議目的、主要討論點、最終決議或待辦行動項目。
      使用繁體中文，直接輸出摘要：

    moments: |
      以下是一段會議字幕片段（格式：[HH:MM:SS] 內容）。
      請找出最多2個重要時刻（決策確認、行動項目、重要發現），
      每個輸出一行，格式：[HH:MM:SS] 描述（繁體中文）
      只輸出符合格式的行，不要其他說明：

    topics: |
      以下是一場會議的逐字稿摘錄。請列出2到6個討論議題或議程項目，
      每個議題用4到10個繁體中文字概括，每行只寫一個議題名稱，不要編號：

  general:
    overview: |
      以下是一段錄音的逐字稿，請生成3到5句話的整體摘要，
      使用繁體中文，不要加標題，直接輸出摘要內容：

    moments: |
      以下是一段字幕片段（格式：[HH:MM:SS] 內容）。
      請找出最多2個重要時刻，每個輸出一行，格式：[HH:MM:SS] 描述（繁體中文）
      只輸出符合格式的行，不要其他說明：

    topics: |
      以下是一段錄音的逐字稿摘錄。請列出2到6個主要主題，
      每個主題用4到10個繁體中文字概括，每行只寫一個主題名稱，不要編號：

correct_srt:
  base: |
    以下是Whisper語音辨識輸出（繁體中文），格式為「序號|文字」。
    請修正同音字錯誤和辨識錯誤，保持序號和總行數不變。
    直接輸出修正後的「序號|文字」格式，不要其他說明：

chapters:
  first_title: |
    以下是一段錄音的開頭字幕（繁體中文）。
    請用4到8個字為這個開場章節命名，只輸出章節名稱：

  boundary_title: |
    以下是一段錄音字幕中靜音分界前後的內容（繁體中文）。
    請根據【後段】的主題，用4到8個字為這個新章節命名，只輸出章節名稱：
