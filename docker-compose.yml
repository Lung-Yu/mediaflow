services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mediaflow
      POSTGRES_USER: mediaflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediaflow -d mediaflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync always
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9002"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-mediaflow}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9002:9002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=/app/data/pipeline.db
      - WORKSPACE_DIR=/workspace
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-mediaflow}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-changeme}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_INPUT_BUCKET=${MINIO_INPUT_BUCKET:-mediaflow-input}
      - MINIO_OUTPUT_BUCKET=${MINIO_OUTPUT_BUCKET:-mediaflow-output}
      - UPLOAD_MAX_FILE_BYTES=${UPLOAD_MAX_FILE_BYTES:-5368709120}
      - UPLOAD_PART_SIZE_BYTES=${UPLOAD_PART_SIZE_BYTES:-104857600}
      - UPLOAD_MAX_CONCURRENT=${UPLOAD_MAX_CONCURRENT:-2}
      - LIFECYCLE_OUTPUT=${LIFECYCLE_OUTPUT:-forever}
      - LIFECYCLE_MINIO_INPUT=${LIFECYCLE_MINIO_INPUT:-forever}
      - LIFECYCLE_MINIO_OUTPUT=${LIFECYCLE_MINIO_OUTPUT:-forever}
      - DATABASE_URL=postgresql://mediaflow:${POSTGRES_PASSWORD:-changeme}@postgres:5432/mediaflow
    volumes:
      - ./workspace:/workspace:ro          # read-only SRT access (same-machine deploy)
      - ./workspace/1_input:/workspace/1_input  # writable for queue consumer downloads
      - ./workspace/3_output:/workspace/3_output  # writable for speaker_names.json
      - ./data:/app/data                   # writable dir for pipeline.db
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    environment:
      - API_URL=http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  redis-data:
  minio-data:
  postgres-data:
