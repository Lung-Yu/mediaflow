services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mediaflow
      POSTGRES_USER: mediaflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediaflow -d mediaflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync always
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9002"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-mediaflow}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9002:9002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=/app/data/pipeline.db
      - WORKSPACE_DIR=/workspace
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-mediaflow}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-changeme}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_INPUT_BUCKET=${MINIO_INPUT_BUCKET:-mediaflow-input}
      - MINIO_OUTPUT_BUCKET=${MINIO_OUTPUT_BUCKET:-mediaflow-output}
      - MINIO_PROCESSING_BUCKET=${MINIO_PROCESSING_BUCKET:-mediaflow-processing}
      - MINIO_CLIPS_BUCKET=${MINIO_CLIPS_BUCKET:-mediaflow-clips}
      - UPLOAD_MAX_FILE_BYTES=${UPLOAD_MAX_FILE_BYTES:-5368709120}
      - UPLOAD_PART_SIZE_BYTES=${UPLOAD_PART_SIZE_BYTES:-104857600}
      - UPLOAD_MAX_CONCURRENT=${UPLOAD_MAX_CONCURRENT:-2}
      - LIFECYCLE_OUTPUT=${LIFECYCLE_OUTPUT:-forever}
      - LIFECYCLE_MINIO_INPUT=${LIFECYCLE_MINIO_INPUT:-forever}
      - LIFECYCLE_MINIO_OUTPUT=${LIFECYCLE_MINIO_OUTPUT:-forever}
      - DATABASE_URL=postgresql://mediaflow:${POSTGRES_PASSWORD:-changeme}@postgres:5432/mediaflow
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
    volumes:
      - ./workspace:/workspace:ro          # read-only SRT access (same-machine deploy)
      - ./workspace/1_input:/workspace/1_input  # writable for queue consumer downloads
      - ./workspace/3_output:/workspace/3_output  # writable for speaker_names.json
      - ./data:/app/data                   # writable dir for pipeline.db
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_HTTP_PORT=3001
      - GF_SMTP_ENABLED=${GRAFANA_SMTP_ENABLED:-false}
      - GF_SMTP_HOST=${GRAFANA_SMTP_HOST:-}
      - GF_SMTP_USER=${GRAFANA_SMTP_USER:-}
      - GF_SMTP_PASSWORD=${GRAFANA_SMTP_PASSWORD:-}
      - GF_SMTP_FROM_ADDRESS=${GRAFANA_SMTP_FROM:-alerts@mediaflow.local}
      - GF_UNIFIED_ALERTING_ENABLED=true
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:1/webhook-not-configured}
      - GRAFANA_ALERT_EMAIL=${GRAFANA_ALERT_EMAIL:-alerts@localhost}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3001"
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8081:8080"
    command:
      - --docker_only=true
      - --store_container_labels=false

  redis_exporter:
    image: oliver006/redis_exporter:latest
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://mediaflow:${POSTGRES_PASSWORD:-changeme}@postgres:5432/mediaflow?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  blackbox_exporter:
    image: prom/blackbox-exporter:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml
    ports:
      - "9115:9115"

volumes:
  redis-data:
  minio-data:
  postgres-data:
  prometheus-data:
  grafana-data:
