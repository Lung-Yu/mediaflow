services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync always
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=/app/data/pipeline.db
      - WORKSPACE_DIR=/workspace
      - WEBHOOK_URL=${WEBHOOK_URL:-}
    volumes:
      - ./workspace:/workspace:ro   # read-only SRT access (same-machine deploy)
      - ./data:/app/data            # writable dir for pipeline.db
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    environment:
      - API_URL=http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  redis-data:
